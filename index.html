<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fairness Checker (Mock Gemini)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .sub { text-align: center; color: #666; margin-bottom: 30px; }
        .upload-area { border: 2px dashed #ccc; border-radius: 15px; padding: 40px; text-align: center; cursor: pointer; background: #f9f9f9; margin-bottom: 20px; }
        .upload-area:hover { border-color: #667eea; background: #f0f0ff; }
        input[type="file"] { display: none; }
        button { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; }
        .result { margin-top: 30px; background: #f8f9fa; border-radius: 15px; padding: 20px; display: none; }
        .fairness-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; margin-bottom: 15px; }
        .fair { background: #d4edda; color: #155724; }
        .unfair { background: #f8d7da; color: #721c24; }
        .slightly-unfair { background: #fff3cd; color: #856404; }
        .metric-card { background: white; border-radius: 10px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; }
        .chart-container { max-width: 400px; margin: 20px auto; }
        .gemini-section { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 20px; }
        .chat-messages { background: white; border-radius: 10px; padding: 15px; max-height: 300px; overflow-y: auto; margin-top: 10px; }
        .user-msg { background: #e9ecef; padding: 8px 12px; border-radius: 15px; margin: 5px 0; text-align: right; }
        .ai-msg { background: #667eea; color: white; padding: 8px 12px; border-radius: 15px; margin: 5px 0; }
        .chat-input { display: flex; gap: 10px; margin-top: 10px; }
        .chat-input input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
        .sample-link { margin-top: 20px; text-align: center; }
        .sample-link a { color: #667eea; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚖️ AI Fairness Checker</h1>
    <div class="sub">Statistical Parity · Disparate Impact · Equalized Odds<br>Mock Gemini AI for Demo</div>

    <div class="upload-area" onclick="document.getElementById('csvFile').click()">
        📁 Click to upload CSV (columns: decision, protected)
    </div>
    <input type="file" id="csvFile" accept=".csv">
    <button id="analyzeBtn">Analyze Fairness</button>
    <div class="sample-link"><a id="downloadSample">Download sample CSV</a></div>

    <div class="result" id="resultDiv">
        <div id="fairnessBadge" class="fairness-badge"></div>
        <div class="metric-card"><strong>SPD:</strong> <span id="spdValue">-</span></div>
        <div class="metric-card"><strong>DIR:</strong> <span id="dirValue">-</span></div>
        <div class="metric-card"><strong>TPR Diff:</strong> <span id="tprDiffValue">-</span></div>
        <div class="metric-card"><strong>p-value:</strong> <span id="pValue">-</span></div>
        <div class="chart-container"><canvas id="fairnessChart"></canvas></div>
        <div id="explanation"></div>

        <div class="gemini-section">
            <button id="geminiBtn">💬 Ask Gemini AI (Mock)</button>
            <div id="chatMessages" class="chat-messages" style="display:none;"></div>
            <div class="chat-input" style="display:none;">
                <input type="text" id="chatInput" placeholder="Ask a follow-up...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    let chartInstance = null;
    let currentMetrics = null;

    // Sample CSV download
    document.getElementById('downloadSample').addEventListener('click', () => {
        const sample = "decision,protected\n1,Female\n1,Female\n1,Female\n0,Female\n1,Male\n1,Male\n1,Male\n0,Male";
        const blob = new Blob([sample], {type: "text/csv"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "sample.csv";
        link.click();
        URL.revokeObjectURL(link.href);
    });

    function calculateMetrics(rows) {
        const groups = [...new Set(rows.map(r => r.protected))];
        if (groups.length !== 2) throw new Error('Need exactly 2 groups');
        const g0 = groups[0], g1 = groups[1];
        const getRate = (g) => {
            const sub = rows.filter(r => r.protected === g);
            const pos = sub.filter(r => r.decision == 1).length;
            return pos / sub.length;
        };
        const r0 = getRate(g0), r1 = getRate(g1);
        const spd = r1 - r0;
        const dir = r0 === 0 ? (r1 === 0 ? 1 : Infinity) : r1 / r0;
        const tprDiff = r1 - r0;
        // chi-square p-value
        const counts = [[0,0],[0,0]];
        rows.forEach(r => {
            const i = r.protected === g1 ? 1 : 0;
            const j = r.decision == 1 ? 0 : 1;
            counts[i][j]++;
        });
        const total = counts[0][0]+counts[0][1]+counts[1][0]+counts[1][1];
        const rowSum = [counts[0][0]+counts[0][1], counts[1][0]+counts[1][1]];
        const colSum = [counts[0][0]+counts[1][0], counts[0][1]+counts[1][1]];
        let chi2 = 0;
        for(let i=0;i<2;i++){
            for(let j=0;j<2;j++){
                const expected = (rowSum[i]*colSum[j])/total;
                if(expected>0) chi2 += Math.pow(counts[i][j]-expected,2)/expected;
            }
        }
        const p = 1 - chi2CDF(chi2,1);
        return { spd, dir, tprDiff, p, group0: g0, group1: g1, prob0: r0, prob1: r1 };
    }

    function chi2CDF(chi2, df) {
        if(df!==1) return 0.5;
        const x = Math.sqrt(chi2);
        const erf = (z) => {
            const t = 1/(1+0.3275911*Math.abs(z));
            const ans = 1-((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t*Math.exp(-z*z);
            return z>=0 ? ans : -ans;
        };
        return 0.5*(1+erf(x/Math.sqrt(2)));
    }

    function displayResults(m) {
        currentMetrics = m;
        const spdFair = Math.abs(m.spd) < 0.1;
        const dirFair = (typeof m.dir === 'number') && m.dir >= 0.8 && m.dir <= 1.25;
        const tprFair = Math.abs(m.tprDiff) < 0.1;
        let verdict, color;
        if(spdFair && dirFair && tprFair) { verdict = "FAIR"; color = "fair"; }
        else if(Math.abs(m.spd)>0.2 || (typeof m.dir==='number' && (m.dir<0.5||m.dir>2)) || Math.abs(m.tprDiff)>0.2) { verdict = "UNFAIR"; color = "unfair"; }
        else { verdict = "MODERATELY UNFAIR"; color = "slightly-unfair"; }
        document.getElementById('fairnessBadge').innerHTML = verdict;
        document.getElementById('fairnessBadge').className = `fairness-badge ${color}`;
        document.getElementById('spdValue').innerText = m.spd.toFixed(4);
        document.getElementById('dirValue').innerText = (typeof m.dir==='number')?m.dir.toFixed(4):m.dir;
        document.getElementById('tprDiffValue').innerText = m.tprDiff.toFixed(4);
        document.getElementById('pValue').innerText = m.p.toFixed(6);
        document.getElementById('explanation').innerHTML = `Group '${m.group1}' gets ${(m.prob1*100).toFixed(1)}%, '${m.group0}' gets ${(m.prob0*100).toFixed(1)}%. SPD: ${m.spd.toFixed(4)}`;
        updateChart(m.group0, m.prob0, m.group1, m.prob1);
        document.getElementById('resultDiv').style.display = 'block';
    }

    function updateChart(g0, r0, g1, r1) {
        const ctx = document.getElementById('fairnessChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: [g0, g1], datasets: [{ label: 'Positive Rate (%)', data: [r0*100, r1*100], backgroundColor: ['#3b82f6','#ec489a'] }] },
            options: { responsive: true, scales: { y: { max: 100 } } }
        });
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        Papa.parse(file, {
            header: true,
            complete: function(results) {
                try {
                    const rows = results.data;
                    if (rows.length === 0) throw new Error('Empty CSV');
                    const metrics = calculateMetrics(rows);
                    displayResults(metrics);
                } catch(err) { alert(err.message); }
            }
        });
    });

    // Mock Gemini AI (no API key needed)
    const geminiBtn = document.getElementById('geminiBtn');
    const chatDiv = document.getElementById('chatMessages');
    const chatInputDiv = document.querySelector('.chat-input');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = role === 'user' ? 'user-msg' : 'ai-msg';
        msgDiv.textContent = text;
        chatDiv.appendChild(msgDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    geminiBtn.addEventListener('click', () => {
        if (!currentMetrics) { alert('Analyze a CSV first'); return; }
        chatDiv.style.display = 'block';
        chatInputDiv.style.display = 'flex';
        geminiBtn.disabled = true;
        geminiBtn.textContent = 'Gemini (mock) ...';
        setTimeout(() => {
            const mockReply = `Based on the metrics: SPD = ${currentMetrics.spd.toFixed(3)}, DIR = ${(typeof currentMetrics.dir === 'number' ? currentMetrics.dir.toFixed(3) : currentMetrics.dir)}. The model is ${document.getElementById('fairnessBadge').innerText.toLowerCase()}. Recommendation: ${currentMetrics.spd > 0.1 ? 'Collect more balanced data.' : 'Maintain current fairness practices.'}`;
            addMessage('ai', mockReply);
            geminiBtn.disabled = false;
            geminiBtn.textContent = '💬 Ask Gemini AI (Mock)';
        }, 500);
        addMessage('ai', 'Thinking... (mock AI response)');
    });

    sendBtn.addEventListener('click', () => {
        const q = chatInput.value.trim();
        if (!q) return;
        addMessage('user', q);
        chatInput.value = '';
        addMessage('ai', 'This is a mock AI. In production, it would call Google Gemini API.');
    });
</script>
</body>
</html>
